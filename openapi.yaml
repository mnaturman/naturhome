openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Calendar events
  - name: tasks
    description: Tasks and todos
  - name: meals
    description: Meal planning
  - name: family
    description: Family members
  - name: dashboard
    description: Dashboard summaries
  - name: openai
    description: AI assistant
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /family-members:
    get:
      operationId: listFamilyMembers
      tags: [family]
      summary: List all family members
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FamilyMember"
    post:
      operationId: createFamilyMember
      tags: [family]
      summary: Create a family member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFamilyMemberBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"

  /family-members/{id}:
    get:
      operationId: getFamilyMember
      tags: [family]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"
    put:
      operationId: updateFamilyMember
      tags: [family]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFamilyMemberBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"
    delete:
      operationId: deleteFamilyMember
      tags: [family]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List calendar events
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: familyMemberId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a calendar event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
    put:
      operationId: updateEvent
      tags: [events]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
    delete:
      operationId: deleteEvent
      tags: [events]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - name: familyMemberId
          in: query
          schema:
            type: integer
        - name: completed
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    put:
      operationId: updateTask
      tags: [tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /meals:
    get:
      operationId: listMeals
      tags: [meals]
      summary: List meal plans
      parameters:
        - name: weekOf
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meal"
    post:
      operationId: createMeal
      tags: [meals]
      summary: Create a meal plan entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMealBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meal"

  /meals/{id}:
    put:
      operationId: updateMeal
      tags: [meals]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMealBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meal"
    delete:
      operationId: deleteMeal
      tags: [meals]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary counts and upcoming items
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/upcoming-events:
    get:
      operationId: getUpcomingEvents
      tags: [dashboard]
      summary: Get next 7 days of events
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"

  /dashboard/pending-tasks:
    get:
      operationId: getPendingTasks
      tags: [dashboard]
      summary: Get all incomplete tasks
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /dashboard/this-week-meals:
    get:
      operationId: getThisWeekMeals
      tags: [dashboard]
      summary: Get this week's meal plan
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meal"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List AI conversations
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new AI conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiConversationMessages
      tags: [openai]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    FamilyMember:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [parent, child, grandparent, aunt_uncle, cousin, other]
        color:
          type: string
        avatarInitials:
          type: string
        createdAt:
          type: string
      required:
        - id
        - userId
        - name
        - role
        - color
        - avatarInitials
        - createdAt

    CreateFamilyMemberBody:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [parent, child, grandparent, aunt_uncle, cousin, other]
        color:
          type: string
        avatarInitials:
          type: string
      required:
        - name
        - role
        - color
        - avatarInitials

    CalendarEvent:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        title:
          type: string
        description:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        allDay:
          type: boolean
        location:
          type: string
        familyMemberId:
          type: integer
        color:
          type: string
        category:
          type: string
          enum: [school, work, health, sports, social, family, other]
        recurrence:
          type: string
          enum: [none, daily, weekly, biweekly, monthly]
        recurrenceDays:
          type: string
        recurrenceEndDate:
          type: string
        createdAt:
          type: string
      required:
        - id
        - userId
        - title
        - startTime
        - endTime
        - allDay
        - category
        - recurrence
        - createdAt

    CreateEventBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        allDay:
          type: boolean
        location:
          type: string
        familyMemberId:
          type: integer
        color:
          type: string
        category:
          type: string
          enum: [school, work, health, sports, social, family, other]
        recurrence:
          type: string
          enum: [none, daily, weekly, biweekly, monthly]
        recurrenceDays:
          type: string
        recurrenceEndDate:
          type: string
      required:
        - title
        - startTime
        - endTime
        - allDay
        - category

    Task:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        title:
          type: string
        notes:
          type: string
        completed:
          type: boolean
        dueDate:
          type: string
        priority:
          type: string
          enum: [low, medium, high]
        familyMemberId:
          type: integer
        category:
          type: string
          enum: [household, school, errands, health, work, other]
        createdAt:
          type: string
      required:
        - id
        - userId
        - title
        - completed
        - priority
        - category
        - createdAt

    CreateTaskBody:
      type: object
      properties:
        title:
          type: string
        notes:
          type: string
        dueDate:
          type: string
        priority:
          type: string
          enum: [low, medium, high]
        familyMemberId:
          type: integer
        category:
          type: string
          enum: [household, school, errands, health, work, other]
      required:
        - title
        - priority
        - category

    UpdateTaskBody:
      type: object
      properties:
        title:
          type: string
        notes:
          type: string
        completed:
          type: boolean
        dueDate:
          type: string
        priority:
          type: string
          enum: [low, medium, high]
        familyMemberId:
          type: integer
        category:
          type: string
          enum: [household, school, errands, health, work, other]

    Meal:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack]
        date:
          type: string
        notes:
          type: string
        ingredients:
          type: string
        createdAt:
          type: string
      required:
        - id
        - userId
        - name
        - mealType
        - date
        - createdAt

    CreateMealBody:
      type: object
      properties:
        name:
          type: string
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack]
        date:
          type: string
        notes:
          type: string
        ingredients:
          type: string
      required:
        - name
        - mealType
        - date

    DashboardSummary:
      type: object
      properties:
        totalEvents:
          type: integer
        totalTasks:
          type: integer
        pendingTasks:
          type: integer
        completedTasks:
          type: integer
        totalFamilyMembers:
          type: integer
        mealsPlannedThisWeek:
          type: integer
        eventsToday:
          type: integer
        eventsTomorrow:
          type: integer
      required:
        - totalEvents
        - totalTasks
        - pendingTasks
        - completedTasks
        - totalFamilyMembers
        - mealsPlannedThisWeek
        - eventsToday
        - eventsTomorrow

    Conversation:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        title:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - title
        - createdAt
        - updatedAt

    CreateConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
